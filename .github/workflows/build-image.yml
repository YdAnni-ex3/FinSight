name: Build gateway image

# Builds the gateway container on GitHub's runners (no local Docker needed) and
# pushes it to GitHub Container Registry. Container Apps then pulls this image.
on:
  push:
    branches: [main]
    paths:
      - "services/gateway/**"
      - "libs/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/ydanni-ex3/finsight-gateway

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/gateway/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
