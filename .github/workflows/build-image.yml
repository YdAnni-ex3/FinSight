name: Build gateway image

# Builds the gateway container on GitHub's runners (no local Docker needed) and
# pushes it to GitHub Container Registry. Container Apps then pulls this image.
on:
  push:
    branches: [main]
    paths:
      - "services/gateway/**"
      - "libs/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/ydanni-ex3/finsight-gateway
  APP_NAME: finsight-gateway
  RESOURCE_GROUP: finsight-rg

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/gateway/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  # Auto-deploy the freshly built image to Azure Container Apps. Self-gating:
  # it skips (green) until the AZURE_CREDENTIALS secret is added to the repo.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check for Azure credentials
        id: check
        env:
          CREDS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          if [ -n "$CREDS" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AZURE_CREDENTIALS not set — skipping auto-deploy. Add the secret to enable."
          fi

      - name: Azure login
        if: steps.check.outputs.enabled == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        if: steps.check.outputs.enabled == 'true'
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ env.APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.IMAGE }}:${{ github.sha }}
